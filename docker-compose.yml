version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: wex
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d wex"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5

  flyway:
    image: flyway/flyway
    command: -url=jdbc:postgresql://postgres:5432/wex -user=user -password=password -connectRetries=60 migrate
    volumes:
      - ./flyway/sql:/flyway/sql
    depends_on:
      postgres:
        condition: service_healthy

  api-service:
    build: ./api_service
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - VALKEY_URL=valkey:6379
      - DATABASE_URL=postgres://user:password@postgres:5432/wex?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      valkey:
        condition: service_healthy

  transaction-service:
    build: ./transaction_service
    environment:
      - DATABASE_URL=postgres://user:password@postgres:5432/wex?sslmode=disable
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - VALKEY_URL=valkey:6379
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      valkey:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully

  conversion-service:
    build: ./conversion_service
    environment:
      - DATABASE_URL=postgres://user:password@postgres:5432/wex?sslmode=disable
      - VALKEY_URL=valkey:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
